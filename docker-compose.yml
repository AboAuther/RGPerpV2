x-backend-image: &backend-image
  build:
    context: .
    dockerfile: deploy/docker/backend.Dockerfile
  image: rgperp-backend:local
  env_file:
    - deploy/env/common.env
    - deploy/env/dev.env

x-backend-env: &backend-env
  APP_ENV: dev
  MYSQL_DSN: root:root@tcp(mysql:3306)/rgperp?charset=utf8mb4&parseTime=True&loc=UTC
  REDIS_ADDR: redis:6379
  RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
  CHAIN_ENV_FILE: /shared-env/local-chains.env

x-backend-depends: &backend-depends
  mysql:
    condition: service_healthy
  mysql-init:
    condition: service_completed_successfully
  redis:
    condition: service_healthy
  rabbitmq:
    condition: service_healthy

x-runtime-depends: &runtime-depends
  mysql:
    condition: service_healthy
  mysql-init:
    condition: service_completed_successfully
  redis:
    condition: service_healthy
  rabbitmq:
    condition: service_healthy
  migrator:
    condition: service_completed_successfully

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rgperp
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mysql_data:/var/lib/mysql

  mysql-init:
    image: mysql:8.4
    depends_on:
      mysql:
        condition: service_healthy
    command:
      - sh
      - -c
      - mysql -hmysql -uroot -proot -e "CREATE DATABASE IF NOT EXISTS rgperp CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 20

  migrator:
    <<: *backend-image
    depends_on: *backend-depends
    environment:
      <<: *backend-env
      SERVICE_BIN: migrator
      APP_PORT: 8083
    restart: "no"
    volumes:
      - ./deploy/env:/shared-env:ro

  api-server:
    <<: *backend-image
    depends_on: *runtime-depends
    environment:
      <<: *backend-env
      SERVICE_BIN: api-server
      APP_PORT: 8080
    ports:
      - "8080:8080"
    restart: unless-stopped
    volumes:
      - ./deploy/env:/shared-env:ro

  indexer:
    <<: *backend-image
    depends_on: *runtime-depends
    environment:
      <<: *backend-env
      SERVICE_BIN: indexer
      APP_PORT: 8081
    restart: unless-stopped
    volumes:
      - ./deploy/env:/shared-env:ro

  market-data:
    <<: *backend-image
    depends_on: *runtime-depends
    environment:
      <<: *backend-env
      SERVICE_BIN: market-data
      APP_PORT: 8082
    restart: unless-stopped
    volumes:
      - ./deploy/env:/shared-env:ro

  order-executor-worker:
    <<: *backend-image
    depends_on: *runtime-depends
    environment:
      <<: *backend-env
      SERVICE_BIN: order-executor-worker
      APP_PORT: 8086
    restart: unless-stopped
    volumes:
      - ./deploy/env:/shared-env:ro

  risk-engine-worker:
    <<: *backend-image
    depends_on: *runtime-depends
    environment:
      <<: *backend-env
      SERVICE_BIN: risk-engine-worker
      APP_PORT: 8087
    restart: unless-stopped
    volumes:
      - ./deploy/env:/shared-env:ro

  funding-worker:
    <<: *backend-image
    depends_on: *runtime-depends
    environment:
      <<: *backend-env
      SERVICE_BIN: funding-worker
      APP_PORT: 8084
    restart: unless-stopped
    volumes:
      - ./deploy/env:/shared-env:ro

  liquidator-worker:
    <<: *backend-image
    depends_on: *runtime-depends
    environment:
      <<: *backend-env
      SERVICE_BIN: liquidator-worker
      APP_PORT: 8085
    restart: unless-stopped
    volumes:
      - ./deploy/env:/shared-env:ro

  hedger-worker:
    <<: *backend-image
    depends_on: *runtime-depends
    environment:
      <<: *backend-env
      SERVICE_BIN: hedger-worker
      APP_PORT: 8088
    restart: unless-stopped
    volumes:
      - ./deploy/env:/shared-env:ro

volumes:
  mysql_data:
